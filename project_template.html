<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofek Cohen — Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Bungee&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFAF6;
    --ink:#0A0A0A;
    --acid:#C6F221;
    --line:rgba(10,10,10,0.16);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--paper); color:var(--ink); overflow-x:hidden; cursor:none; scroll-behavior:smooth; }
  @media (hover:none){ html,body{ cursor:auto; } }
  body{ font-family:'Inter',sans-serif; position:relative; }
  ::selection{ background:var(--acid); color:var(--ink); }
  img,video{ display:block; max-width:100%; }
  a{ color:inherit; }

  /* ---------- CUSTOM CURSOR ---------- */
  #cursor{
    position:fixed; top:0; left:0; width:14px; height:14px;
    border:2px solid var(--ink); background:transparent; pointer-events:none; z-index:9999;
    transform:translate(-50%,-50%);
    transition:width .15s cubic-bezier(.2,.8,.2,1), height .15s cubic-bezier(.2,.8,.2,1), background .15s ease;
    display:flex; align-items:center; justify-content:center;
  }
  #cursor span{ font-family:'Space Mono',monospace; font-size:9px; font-weight:700; color:var(--paper); opacity:0; white-space:nowrap; letter-spacing:.05em; }
  #cursor.active{ width:58px; height:58px; background:var(--ink); }
  #cursor.active span{ opacity:1; }
  @media (hover:none){ #cursor{ display:none; } }

  /* ---------- NAV ---------- */
  nav{
    position:fixed; top:0; left:0; right:0; z-index:30;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 52px; border-bottom:2px solid var(--ink); background:var(--paper);
  }
  .logo{ display:flex; align-items:center; height:35px; text-decoration:none; }
  .logo img{ height:100%; width:auto; display:block; }
  .navlinks{ display:flex; gap:36px; list-style:none; }
  .navlinks a{ font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); text-decoration:none; position:relative; }
  .navlinks a::after{ content:''; position:absolute; left:0; bottom:-4px; width:0; height:2px; background:var(--acid); transition:width .2s cubic-bezier(.2,.8,.2,1); }
  .navlinks a:hover::after{ width:100%; }
  @media (max-width:640px){ .navlinks{ display:none; } }

  /* ---------- PAGE STRUCTURE ---------- */
  main{ padding-top:73px; }
  section{ padding:80px 52px; border-top:2px solid var(--ink); }
  @media (max-width:640px){ section{ padding:60px 24px; } nav{ padding:14px 24px; } }

  /* ---------- REVEAL PRIMITIVE ---------- */
  .reveal{ opacity:0; transform:translateY(24px); transition:opacity .6s cubic-bezier(.22,1,.36,1), transform .6s cubic-bezier(.22,1,.36,1); }
  .reveal.in{ opacity:1; transform:translateY(0); }

  /* ---------- PROJECT HERO ---------- */
  .p-hero{ padding:80px 52px 60px; border-top:none; }
  .p-hero .meta{ display:flex; flex-wrap:wrap; gap:10px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:36px; }
  .p-hero .meta span{ border:1.5px solid var(--ink); padding:5px 10px; }
  .p-hero .meta .year{ background:var(--acid); }
  .p-hero h1{
    font-family:'Unbounded',sans-serif; font-weight:900;
    font-size:clamp(48px, 12vw, 178px); line-height:0.9; letter-spacing:-0.03em;
    text-transform:uppercase; margin-bottom:36px;
  }
  .p-hero .description{ max-width:640px; font-size:clamp(16px,1.6vw,20px); line-height:1.5; color:#333; }
  .p-hero-visual{
    margin-top:60px; border:2px solid var(--ink);
    aspect-ratio:16/9; overflow:hidden; position:relative;
  }
  .p-hero-visual img{ width:100%; height:100%; object-fit:cover; }
  .p-hero-visual.video-style img{ animation:kenburns 14s ease-in-out infinite alternate; }
  @keyframes kenburns{ 0%{ transform:scale(1) translate(0,0); } 100%{ transform:scale(1.1) translate(-2%,-1%); } }
  .video-badge{
    position:absolute; top:16px; left:16px; font-family:'Space Mono',monospace;
    font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    background:var(--acid); color:var(--ink); padding:5px 9px; border:1.5px solid var(--ink);
    display:flex; align-items:center; gap:6px;
  }
  .video-badge::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--ink); animation:pulse 1.4s infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.5); } }

  /* ---------- OVERVIEW ---------- */
  .overview-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:2px; background:var(--ink); border:2px solid var(--ink); }
  .overview-item{ background:var(--paper); padding:32px 26px; min-height:180px; }
  .overview-item .label{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#666; margin-bottom:14px; }
  .overview-item .value{ font-size:15px; line-height:1.5; }
  @media (max-width:900px){ .overview-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:500px){ .overview-grid{ grid-template-columns:1fr; } }

  /* ---------- SECTION HEADERS ---------- */
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:56px; flex-wrap:wrap; gap:16px; }
  .section-head h2{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:clamp(32px,5.5vw,72px); line-height:0.95; text-transform:uppercase; letter-spacing:-0.02em; }
  .section-head .num{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#666; }

  /* ---------- FULL WIDTH VISUAL ---------- */
  .full-visual .visual{ border:2px solid var(--ink); aspect-ratio:16/9; overflow:hidden; position:relative; }
  .full-visual img{ width:100%; height:100%; object-fit:cover; }
  .full-visual .caption{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#666; margin-top:14px; text-align:right; }

  /* ---------- PROCESS ---------- */
  .process-item{ display:grid; grid-template-columns:1fr 1fr; gap:48px; padding:64px 0; border-top:1px solid var(--line); align-items:center; }
  .process-item:first-of-type{ border-top:none; padding-top:20px; }
  .process-item .txt .num{ font-family:'Space Mono',monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#666; margin-bottom:16px; display:inline-block; border:1.5px solid var(--ink); padding:3px 9px; }
  .process-item h3{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:clamp(24px,3vw,40px); line-height:1.05; text-transform:uppercase; letter-spacing:-0.01em; margin:16px 0 20px; }
  .process-item p{ font-size:16px; line-height:1.6; color:#333; max-width:480px; }
  .process-item .media{ border:2px solid var(--ink); aspect-ratio:4/3; overflow:hidden; position:relative; }
  .process-item .media img{ width:100%; height:100%; object-fit:cover; }
  .process-item.reverse .media{ order:-1; }
  @media (max-width:800px){
    .process-item{ grid-template-columns:1fr; gap:28px; padding:40px 0; }
    .process-item.reverse .media{ order:0; }
  }

  /* ---------- GALLERY ---------- */
  .gallery-block{ margin-bottom:32px; }
  .gallery-block:last-child{ margin-bottom:0; }
  .gallery-block .visual{ border:2px solid var(--ink); overflow:hidden; position:relative; background:#eee; }
  .gallery-block .visual img{ width:100%; height:100%; object-fit:cover; }
  .gallery-block.full .visual{ aspect-ratio:16/9; }
  .gallery-block.two-col{ display:grid; grid-template-columns:1fr 1fr; gap:32px; }
  .gallery-block.two-col .visual{ aspect-ratio:3/4; }
  .gallery-block.video-block .visual{ aspect-ratio:16/9; }
  .gallery-block.video-block .visual img{ animation:kenburns 16s ease-in-out infinite alternate; }
  .gallery-block .caption{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#666; margin-top:12px; }
  @media (max-width:700px){ .gallery-block.two-col{ grid-template-columns:1fr; gap:24px; } }

  /* ---------- RESULTS ---------- */
  .results{ background:var(--ink); color:var(--paper); }
  .results ::selection{ background:var(--acid); color:var(--ink); }
  .results .section-head h2{ color:var(--paper); }
  .results .section-head .num{ color:var(--acid); }
  .results-text{
    font-family:'Unbounded',sans-serif; font-weight:700;
    font-size:clamp(24px,3.5vw,48px); line-height:1.15;
    max-width:22ch; margin-bottom:60px; letter-spacing:-0.01em;
  }
  .results-text b{ color:var(--acid); font-weight:900; }
  .metrics{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:40px 24px; border-top:1px solid rgba(250,250,246,0.2); padding-top:40px; }
  .metric .num{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:clamp(48px,6vw,84px); line-height:1; color:var(--acid); margin-bottom:12px; letter-spacing:-0.02em; }
  .metric .label{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; opacity:0.7; }

  /* ---------- NEXT PROJECT ---------- */
  .next-link{
    display:grid; grid-template-columns:1fr auto; gap:48px; align-items:center;
    text-decoration:none; color:var(--ink); border:2px solid var(--ink); padding:40px 44px;
    transition:transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease, background .2s ease;
  }
  .next-link:hover{ transform:translate(-6px,-6px); box-shadow:10px 10px 0 var(--ink); background:var(--acid); }
  .next-link .lbl{ font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#666; margin-bottom:16px; }
  .next-link h3{ font-family:'Unbounded',sans-serif; font-weight:900; font-size:clamp(30px,5vw,64px); line-height:0.95; text-transform:uppercase; letter-spacing:-0.02em; }
  .next-link h3 .arrow{ display:inline-block; margin-left:12px; transition:transform .25s cubic-bezier(.2,.8,.2,1); }
  .next-link:hover h3 .arrow{ transform:translate(10px,-10px); }
  .next-link .preview{ width:220px; aspect-ratio:4/3; border:2px solid var(--ink); overflow:hidden; flex-shrink:0; }
  .next-link .preview img{ width:100%; height:100%; object-fit:cover; }
  @media (max-width:700px){
    .next-link{ grid-template-columns:1fr; gap:24px; padding:28px; }
    .next-link .preview{ width:100%; }
  }

  footer.note{ text-align:center; font-family:'Space Mono',monospace; font-size:11px; color:#777; padding:30px; border-top:2px solid var(--ink); }

  @media (prefers-reduced-motion:reduce){
    .reveal{ opacity:1; transform:none; transition:none; }
    .p-hero-visual.video-style img,
    .gallery-block.video-block .visual img{ animation:none; }
    .video-badge::before{ animation:none; }
  }
</style>
</head>

  // ===============================================================
  function getSlug(){
    const s = location.hash.replace("#","").trim();
    return PROJECTS[s] ? s : "luxhair";
  }

  // ===============================================================
  //  TEMPLATE
  // ===============================================================
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function heroMedia(hero){
    const badge = hero.type === "video"
      ? `<div class="video-badge">Video · Autoplay Muted</div>`
      : "";
    const cls = hero.type === "video" ? "p-hero-visual video-style reveal" : "p-hero-visual reveal";
    return `<div class="${cls}"><img src="${hero.src}" alt="">${badge}</div>`;
  }

  function galleryBlock(block){
    if(block.layout === "two-col"){
      return `<div class="gallery-block two-col reveal">
        <div class="visual"><img src="${block.items[0].src}" alt=""></div>
        <div class="visual"><img src="${block.items[1].src}" alt=""></div>
      </div>`;
    }
    if(block.layout === "video"){
      return `<div class="gallery-block video-block reveal">
        <div class="visual">
          <img src="${block.src}" alt="">
          <div class="video-badge">Video · Autoplay Muted</div>
        </div>
        ${block.caption ? `<div class="caption">${esc(block.caption)}</div>` : ""}
      </div>`;
    }
    return `<div class="gallery-block full reveal">
      <div class="visual"><img src="${block.src}" alt=""></div>
      ${block.caption ? `<div class="caption">${esc(block.caption)}</div>` : ""}
    </div>`;
  }

  function render(slug){
    const p = PROJECTS[slug];
    const nextP = PROJECTS[p.next];
    const root = document.getElementById("root");

    root.innerHTML = `
      <section class="p-hero">
        <div class="meta reveal">
          <span class="year">${esc(p.year)}</span>
          <span>${esc(p.category)}</span>
        </div>
        <h1 class="reveal">${esc(p.title)}</h1>
        <p class="description reveal">${esc(p.description)}</p>
        ${heroMedia(p.hero)}
      </section>

      <section class="overview">
        <div class="section-head">
          <h2 class="reveal">Overview</h2>
          <div class="num reveal">§ 01</div>
        </div>
        <div class="overview-grid reveal">
          <div class="overview-item"><div class="label">The Brief</div><div class="value">${esc(p.overview.brief)}</div></div>
          <div class="overview-item"><div class="label">Role</div><div class="value">${esc(p.overview.role)}</div></div>
          <div class="overview-item"><div class="label">Scope</div><div class="value">${esc(p.overview.scope)}</div></div>
          <div class="overview-item"><div class="label">Tools</div><div class="value">${esc(p.overview.tools)}</div></div>
        </div>
      </section>

      <section class="full-visual">
        <div class="visual reveal"><img src="${p.fullVisual.src}" alt=""></div>
        ${p.fullVisual.caption ? `<div class="caption reveal">${esc(p.fullVisual.caption)}</div>` : ""}
      </section>

      <section class="process">
        <div class="section-head">
          <h2 class="reveal">Process</h2>
          <div class="num reveal">§ 02</div>
        </div>
        ${p.process.map((step,i)=>`
          <div class="process-item ${i%2 ? "reverse" : ""}">
            <div class="txt reveal">
              <span class="num">Step ${String(i+1).padStart(2,"0")}</span>
              <h3>${esc(step.title)}</h3>
              <p>${esc(step.text)}</p>
            </div>
            <div class="media reveal"><img src="${step.media}" alt=""></div>
          </div>
        `).join("")}
      </section>

      <section class="gallery">
        <div class="section-head">
          <h2 class="reveal">Gallery</h2>
          <div class="num reveal">§ 03</div>
        </div>
        ${p.gallery.map(galleryBlock).join("")}
      </section>

      <section class="results">
        <div class="section-head">
          <h2 class="reveal">Outcome</h2>
          <div class="num reveal">§ 04</div>
        </div>
        <div class="results-text reveal">${p.results.text}</div>
        <div class="metrics reveal">
          ${p.results.metrics.map(m=>`
            <div class="metric">
              <div class="num">${esc(m.num)}</div>
              <div class="label">${esc(m.label)}</div>
            </div>
          `).join("")}
        </div>
      </section>

      <section class="next">
        <a class="next-link reveal" href="#${p.next}" data-cursor="NEXT →">
          <div>
            <div class="lbl">Next Project</div>
            <h3>${esc(nextP.title)} <span class="arrow">↗</span></h3>
          </div>
          <div class="preview"><img src="${nextP.hero.src}" alt=""></div>
        </a>
      </section>
    `;

    // scroll to top on project change
    window.scrollTo({ top:0, behavior:"instant" });
    // rebind observers/cursor listeners on freshly rendered content
    bindInteractions();
  }

  // ===============================================================
  //  INTERACTIONS
  // ===============================================================
  const cursor = document.getElementById("cursor");
  const cursorLabel = document.getElementById("cursor-label");
  let mx=0,my=0,cx=0,cy=0;
  const isTouch = window.matchMedia("(hover: none)").matches;

  if(!isTouch){
    window.addEventListener("mousemove", e=>{ mx=e.clientX; my=e.clientY; });
    (function loop(){
      cx += (mx-cx)*0.35; cy += (my-cy)*0.35;
      cursor.style.transform = `translate(${cx}px, ${cy}px) translate(-50%,-50%)`;
      requestAnimationFrame(loop);
    })();
  }

  function bindInteractions(){
    if(!isTouch){
      document.querySelectorAll("[data-cursor]").forEach(el=>{
        el.addEventListener("mouseenter", ()=>{ cursor.classList.add("active"); cursorLabel.textContent = el.dataset.cursor; });
        el.addEventListener("mouseleave", ()=>{ cursor.classList.remove("active"); cursorLabel.textContent = ""; });
      });
    }
    // scroll-reveal
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); }
      });
    }, { threshold:0.12 });
    document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
  }

  // ===============================================================
  //  INIT
  // ===============================================================
  render(getSlug());
  window.addEventListener("hashchange", ()=> render(getSlug()));
</script>

</body>
</html>
